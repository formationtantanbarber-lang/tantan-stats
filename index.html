<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TanTan Stats</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="TanTan Stats" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f3; font-family: 'DM Sans', sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import { createElement as h, useState, useEffect } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';

    const SUPABASE_URL = "https://yraslxxvuvkpkosystso.supabase.co";
    const SUPABASE_KEY = "sb_publi6_ERkSDRmt9IZ0Bq7hREhozA_Xa1oAgBH";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const SALONS = [
      { id: "lavalette",  name: "La Valette", emoji: "✂️" },
      { id: "puget",      name: "Puget",      emoji: "💈" },
      { id: "draguignan", name: "Draguignan", emoji: "🪒" },
    ];
    const APP_PASSWORD = "barber2024";
    const SALON_EMPLOYEES = {
      lavalette:  ["Tan", "Theo", "Eric", "Nasser", "Nael", "Cutman", "Manon"],
      puget:      ["Rs cut", "Sonic", "Manon"],
      draguignan: ["Camille", "Colombien", "Manon", "Nael"],
    };
    const DAYS = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
    const MONTHS = ["Jan","Fev","Mar","Avr","Mai","Jun","Jul","Aou","Sep","Oct","Nov","Dec"];

    function getTodayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    }

    const T = {
      bg:"#f5f5f3", surface:"#ffffff", border:"#e8e8e6", text:"#111111",
      muted:"#888888", faint:"#f0f0ee", green:"#2d7a4f", blue:"#1a5a8a",
      greenBg:"#edf7f1", blueBg:"#eaf2fb", red:"#c0392b",
    };

    const css = `
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Bebas+Neue&display=swap');
      *{-webkit-tap-highlight-color:transparent}
      button:active{opacity:.75;transform:scale(.98)}
      input::placeholder{color:#bbb}
      input:focus{border-color:#111!important;outline:none}
      body{background:#f5f5f3}
      ::-webkit-scrollbar{display:none}
      @keyframes spin{to{transform:rotate(360deg)}}
    `;

    // ── App principale ──
    function App() {
      const [view, setView] = useState("password");
      const [currentSalon, setCurrentSalon] = useState(null);
      const [currentEmployee, setCurrentEmployee] = useState(null);
      const [allData, setAllData] = useState({});
      const [allProducts, setAllProducts] = useState({});
      const [loaded, setLoaded] = useState(false);
      const [pwInput, setPwInput] = useState("");
      const [pwError, setPwError] = useState(false);
      const [revEsp, setRevEsp] = useState("");
      const [revCB, setRevCB] = useState("");
      const [clients, setClients] = useState("");
      const [savedToday, setSavedToday] = useState(false);
      const [prodEsp, setProdEsp] = useState("");
      const [prodCB, setProdCB] = useState("");
      const [savedProd, setSavedProd] = useState(false);
      const [myPeriod, setMyPeriod] = useState("month");
      const [mgrPeriod, setMgrPeriod] = useState("month");
      const [rankPeriod, setRankPeriod] = useState("month");
      const [allSalonsData, setAllSalonsData] = useState(null);
      const [rankLoading, setRankLoading] = useState(false);

      // Sélecteurs de date
      const now = new Date();
      const [selYear, setSelYear]   = useState(now.getFullYear());
      const [selMonth, setSelMonth] = useState(now.getMonth()); // 0-11
      const [selDay, setSelDay]     = useState(now.getDate());
      const [mgrYear, setMgrYear]   = useState(now.getFullYear());
      const [mgrMonth, setMgrMonth] = useState(now.getMonth());
      const [mgrDay, setMgrDay]     = useState(now.getDate());

      const YEARS = [2023, 2024, 2025, 2026];
      const MONTH_NAMES = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
      const daysInMonth = (y, m) => new Date(y, m+1, 0).getDate();

      const EMPLOYEES = currentSalon ? (SALON_EMPLOYEES[currentSalon] || []) : [];
      const salonObj = SALONS.find(s => s.id === currentSalon);

      useEffect(() => {
        if (!currentSalon) return;
        let cancelled = false;
        (async () => {
          try {
            const [srvRes, prodRes] = await Promise.all([
              supabase.from('services').select('*').eq('salon', currentSalon),
              supabase.from('produits').select('*').eq('salon', currentSalon)
            ]);
            if (cancelled) return;
            const d = {};
            (srvRes.data || []).forEach(e => {
              if (!d[e.employe]) d[e.employe] = {};
              d[e.employe][e.date_key] = { especes: e.especes, cb: e.cb, revenue: e.revenue, clients: e.clients, day: e.jour, month: e.mois, year: e.annee, date: e.date, _id: e.id };
            });
            const p = {};
            (prodRes.data || []).forEach(e => {
              if (!p[e.employe]) p[e.employe] = {};
              p[e.employe][e.date_key + '-' + e.id] = { especes: e.especes, cb: e.cb, total: e.total, month: e.mois, year: e.annee, dateKey: e.date_key, date: e.date, _id: e.id };
            });
            setAllData(d); setAllProducts(p); setLoaded(true);
          } catch(err) { setLoaded(true); }
        })();
        return () => { cancelled = true; };
      }, [currentSalon]);

      async function saveService(newData, emp, dateKey, entry) {
        if (entry._id) {
          await supabase.from('services').update({ especes: entry.especes, cb: entry.cb, revenue: entry.revenue, clients: entry.clients }).eq('id', entry._id);
        } else {
          const { data } = await supabase.from('services').insert([{ salon: currentSalon, employe: emp, date: entry.date, date_key: dateKey, especes: entry.especes, cb: entry.cb, revenue: entry.revenue, clients: entry.clients, jour: entry.day, mois: entry.month, annee: entry.year }]).select();
          if (data?.[0]) { newData[emp][dateKey]._id = data[0].id; setAllData({...newData}); }
        }
        setAllData({...newData});
      }

      async function saveProduct(emp, entry) {
        const { data } = await supabase.from('produits').insert([{ salon: currentSalon, employe: emp, date: entry.date, date_key: entry.dateKey, especes: entry.especes, cb: entry.cb, total: entry.total, mois: entry.month, annee: entry.year }]).select();
        return data?.[0]?.id;
      }

      function handleLogin(emp) {
        setCurrentEmployee(emp); setView("dashboard");
        setSavedToday(false); setSavedProd(false);
        const entry = allData?.[emp]?.[getTodayKey()];
        if (entry) { setRevEsp(entry.especes ?? ""); setRevCB(entry.cb ?? ""); setClients(entry.clients || ""); setSavedToday(true); }
        else { setRevEsp(""); setRevCB(""); setClients(""); }
      }

      const totalSrv = (parseFloat(revEsp)||0) + (parseFloat(revCB)||0);

      async function handleSubmitDay() {
        if (!revEsp && !revCB && !clients) return;
        const now = new Date(), key = getTodayKey();
        const entry = { especes: parseFloat(revEsp)||0, cb: parseFloat(revCB)||0, revenue: totalSrv, clients: parseInt(clients)||0, day: now.getDay(), month: now.getMonth(), year: now.getFullYear(), date: now.toLocaleDateString("fr-FR") };
        const newData = { ...allData, [currentEmployee]: { ...(allData[currentEmployee]||{}), [key]: { ...(allData[currentEmployee]?.[key]||{}), ...entry } } };
        await saveService(newData, currentEmployee, key, newData[currentEmployee][key]);
        setSavedToday(true);
      }

      async function handleAddProduct() {
        if (!prodEsp && !prodCB) return;
        const now = new Date();
        const esp = parseFloat(prodEsp)||0, cb = parseFloat(prodCB)||0;
        const entry = { especes: esp, cb, total: esp+cb, month: now.getMonth(), year: now.getFullYear(), dateKey: getTodayKey(), date: now.toLocaleDateString("fr-FR") };
        const id = await saveProduct(currentEmployee, entry);
        const key = `${getTodayKey()}-${id||Date.now()}`;
        const newProds = { ...allProducts, [currentEmployee]: { ...(allProducts[currentEmployee]||{}), [key]: { ...entry, _id: id } } };
        setAllProducts(newProds);
        setProdEsp(""); setProdCB(""); setSavedProd(true); setTimeout(() => setSavedProd(false), 2000);
      }

      function getEmpTotals(emp, period, data, products, refYear, refMonth, refDay) {
        const d = data || allData, p = products || allProducts;
        const now = new Date();
        const rYear  = refYear  !== undefined ? refYear  : now.getFullYear();
        const rMonth = refMonth !== undefined ? refMonth : now.getMonth();
        const rDay   = refDay   !== undefined ? refDay   : now.getDate();
        const refDate = new Date(rYear, rMonth, rDay);
        const refDateFR = refDate.toLocaleDateString("fr-FR");
        const todayKey = `${rYear}-${rMonth}-${rDay}`;
        let srvEsp=0, srvCB=0, prodEsp=0, prodCB=0, nbClients=0;
        Object.values(d[emp]||{}).forEach(e => {
          let m = false;
          if (period==="today")  m = (e.date===refDateFR && e.year===rYear);
          if (period==="month")  m = (e.year===rYear && e.month===rMonth);
          if (period==="year")   m = (e.year===rYear);
          if(m){ srvEsp+=e.especes!==undefined?e.especes:(e.revenue||0); srvCB+=(e.cb||0); nbClients+=(e.clients||0); }
        });
        Object.values(p[emp]||{}).forEach(e => {
          let m = false;
          if (period==="today")  m = (e.dateKey===todayKey);
          if (period==="month")  m = (e.year===rYear && e.month===rMonth);
          if (period==="year")   m = (e.year===rYear);
          if(m){ prodEsp+=e.especes!==undefined?e.especes:(e.total||0); prodCB+=(e.cb||0); }
        });
        return { srvEsp, srvCB, prodEsp, prodCB, nbClients, srvTotal:srvEsp+srvCB, prodTotal:prodEsp+prodCB, grand:srvEsp+srvCB+prodEsp+prodCB };
      }

      function getSalonTotals(period, rYear, rMonth, rDay) {
        let sE=0,sC=0,pE=0,pC=0,nC=0; const byEmp={};
        EMPLOYEES.forEach(emp => { const t=getEmpTotals(emp,period,null,null,rYear,rMonth,rDay); sE+=t.srvEsp; sC+=t.srvCB; pE+=t.prodEsp; pC+=t.prodCB; nC+=t.nbClients; byEmp[emp]=t; });
        return { srvEsp:sE,srvCB:sC,prodEsp:pE,prodCB:pC,srvTotal:sE+sC,prodTotal:pE+pC,totalEsp:sE+pE,totalCB:sC+pC,grand:sE+sC+pE+pC,nbClients:nC,byEmp };
      }

      function getStatsForEmployee(emp) {
        const entries=Object.values(allData[emp]||{});
        const byDay=Array(7).fill(0).map(()=>({rev:0,clients:0})), byMonth=Array(12).fill(0).map(()=>({rev:0,clients:0}));
        entries.forEach(e=>{ const d=e.day===0?6:e.day-1; byDay[d].rev+=e.revenue; byDay[d].clients+=e.clients; byMonth[e.month].rev+=e.revenue; byMonth[e.month].clients+=e.clients; });
        return { byDay, byMonth, total:entries.reduce((s,e)=>s+e.revenue,0), totalClients:entries.reduce((s,e)=>s+e.clients,0) };
      }

      function getAllStats() {
        let tR=0,tC=0,tP=0;
        const byDay=Array(7).fill(0).map(()=>({rev:0,clients:0})), byMonth=Array(12).fill(0).map(()=>({rev:0,clients:0})), empStats={};
        EMPLOYEES.forEach(emp=>{ const s=getStatsForEmployee(emp); empStats[emp]=s; tR+=s.total; tC+=s.totalClients; s.byDay.forEach((d,i)=>{byDay[i].rev+=d.rev;}); s.byMonth.forEach((m,i)=>{byMonth[i].rev+=m.rev;}); });
        EMPLOYEES.forEach(emp=>{ Object.values(allProducts[emp]||{}).forEach(p=>{tP+=p.total;}); });
        return { totalRev:tR, totalClients:tC, totalProd:tP, byDay, byMonth, empStats };
      }

      async function loadAllSalons() {
        setRankLoading(true);
        const result = {};
        for (const s of SALONS) {
          let d={}, p={};
          try { const r = await supabase.from('services').select('*').eq('salon', s.id); (r.data||[]).forEach(e=>{ if(!d[e.employe])d[e.employe]={}; d[e.employe][e.date_key]={especes:e.especes,cb:e.cb,revenue:e.revenue,clients:e.clients,day:e.jour,month:e.mois,year:e.annee,date:e.date}; }); } catch{}
          try { const r = await supabase.from('produits').select('*').eq('salon', s.id); (r.data||[]).forEach(e=>{ if(!p[e.employe])p[e.employe]={}; p[e.employe][e.date_key+'-'+e.id]={especes:e.especes,cb:e.cb,total:e.total,month:e.mois,year:e.annee,dateKey:e.date_key}; }); } catch{}
          result[s.id] = { data:d, products:p };
        }
        setAllSalonsData(result); setRankLoading(false);
      }

      function getCrossSalonRanking(period) {
        if (!allSalonsData) return [];
        const rows = [];
        SALONS.forEach(salon => {
          const { data, products } = allSalonsData[salon.id] || { data:{}, products:{} };
          (SALON_EMPLOYEES[salon.id]||[]).forEach(emp => {
            const t = getEmpTotals(emp, period, data, products);
            if (t.grand > 0) rows.push({ emp, salon:salon.name, salonId:salon.id, srvTotal:t.srvTotal, prodTotal:t.prodTotal, grand:t.grand });
          });
        });
        return rows.sort((a,b)=>b.grand-a.grand);
      }

      const stats = loaded ? getAllStats() : null;
      const maxDay = stats ? Math.max(...stats.byDay.map(d=>d.rev),1) : 1;
      const maxMonth = stats ? Math.max(...stats.byMonth.map(m=>m.rev),1) : 1;
      const myProdsMonth = currentEmployee ? Object.values(allProducts[currentEmployee]||{}).filter(p=>{ const now=new Date(); return p.month===now.getMonth()&&p.year===now.getFullYear(); }) : [];
      const myT = loaded && currentEmployee ? getEmpTotals(currentEmployee, myPeriod, null, null, selYear, selMonth, selDay) : null;
      const mgrT = loaded ? getSalonTotals(mgrPeriod, mgrYear, mgrMonth, mgrDay) : null;
      const periodStr = (p, y, m, d) => {
        if(p==="today") return new Date(y,m,d).toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
        if(p==="month") return new Date(y,m,1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
        return `Année ${y}`;
      };

      const IS = { width:"100%", background:T.surface, border:`1.5px solid ${T.border}`, borderRadius:10, padding:"12px 14px", color:T.text, fontSize:16, fontFamily:"'DM Sans',sans-serif", boxSizing:"border-box" };

      const DateSel = ({period, setPeriod, year, setYear, month, setMonth, day, setDay}) => h('div', {style:{marginBottom:20}},
        h('div', {style:{display:"flex",background:T.faint,borderRadius:10,padding:3,gap:3,marginBottom:10}},
          [["today","Jour"],["month","Mois"],["year","Année"]].map(([p,label]) =>
            h('button', {key:p, onClick:()=>setPeriod(p), style:{flex:1,background:period===p?T.surface:"transparent",color:period===p?T.text:T.muted,border:"none",borderRadius:8,padding:"9px 4px",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:period===p?"600":"400",boxShadow:period===p?"0 1px 4px rgba(0,0,0,0.08)":"none"}}, label)
          )
        ),
        h('div', {style:{display:"flex",gap:8}},
          h('select', {value:year, onChange:e=>setYear(parseInt(e.target.value)), style:{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px",fontSize:13,fontFamily:"'DM Sans',sans-serif",color:T.text}},
            YEARS.map(y=>h('option',{key:y,value:y},y))
          ),
          (period==="month"||period==="today") && h('select', {value:month, onChange:e=>setMonth(parseInt(e.target.value)), style:{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px",fontSize:13,fontFamily:"'DM Sans',sans-serif",color:T.text}},
            MONTH_NAMES.map((mn,i)=>h('option',{key:i,value:i},mn))
          ),
          period==="today" && h('select', {value:day, onChange:e=>setDay(parseInt(e.target.value)), style:{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px",fontSize:13,fontFamily:"'DM Sans',sans-serif",color:T.text}},
            Array.from({length:daysInMonth(year,month)},(_,i)=>i+1).map(d=>h('option',{key:d,value:d},d))
          )
        )
      );

      const RankBlock = ({title, items, maxVal, totalVal, currentEmp}) => h('div', {style:{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:20,marginBottom:12}},
        h('div', {style:{color:T.text,fontSize:13,fontWeight:"700",marginBottom:14}}, title),
        totalVal===0 ? h('div', {style:{color:T.muted,fontSize:12,textAlign:"center",padding:"8px 0"}}, "Aucune donnée") :
        items.filter(e=>e.val>0).map((item,rank) => {
          const pct = totalVal>0?(item.val/totalVal)*100:0, isMe=item.emp===currentEmp;
          return h('div', {key:item.emp, style:{marginBottom:12}},
            h('div', {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}},
              h('div', {style:{display:"flex",alignItems:"center",gap:8}},
                h('span', {style:{fontSize:13,width:22}}, ["🥇","🥈","🥉"][rank]||`${rank+1}.`),
                h('div', {style:{width:26,height:26,borderRadius:"50%",background:isMe?T.text:T.faint,color:isMe?"#fff":T.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:"700"}}, item.emp[0]),
                h('div', null,
                  h('div', {style:{color:T.text,fontSize:13,fontWeight:isMe?"700":"500"}}, item.emp + (isMe?" · vous":"")),
                  h('div', {style:{fontSize:10,color:T.muted}}, `💵 ${item.esp.toFixed(0)}€ · 💳 ${item.cb.toFixed(0)}€`)
                )
              ),
              h('div', {style:{textAlign:"right"}},
                h('div', {style:{color:T.text,fontWeight:"700",fontSize:15}}, `${item.val.toFixed(0)}€`),
                h('div', {style:{color:T.muted,fontSize:10}}, `${pct.toFixed(0)}%`)
              )
            ),
            h('div', {style:{height:3,background:T.faint,borderRadius:2,overflow:"hidden"}},
              h('div', {style:{width:`${(item.val/maxVal)*100}%`,height:"100%",background:isMe?T.text:`${T.text}22`,borderRadius:2}})
            )
          );
        })
      );

      if (!loaded && currentSalon) return h('div', {style:{background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
        h('div', {style:{textAlign:"center"}},
          h('div', {style:{width:36,height:36,border:`3px solid ${T.border}`,borderTopColor:T.text,borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 12px"}}),
          h('div', {style:{color:T.muted,fontSize:14}}, "Chargement...")
        )
      );

      return h('div', {style:{background:T.bg,minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",color:T.text,paddingBottom:48}},
        h('style', null, css),

        // HEADER
        h('div', {style:{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}},
          h('div', {style:{display:"flex",alignItems:"center",gap:10}},
            h('div', {style:{width:34,height:34,borderRadius:6,overflow:"hidden",flexShrink:0}},
              h('img', {src:"logo.png", alt:"TanTan", style:{width:"100%",height:"100%",objectFit:"cover",display:"block"},
                onError: e => { e.target.style.display='none'; e.target.parentNode.innerHTML='✂️'; }})
            ),
            h('div', null,
              h('div', {style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:"0.05em",lineHeight:1}}, "TanTan Stats"),
              salonObj && h('div', {style:{color:T.muted,fontSize:11}}, salonObj.name)
            )
          ),
          h('div', {style:{display:"flex",gap:8,alignItems:"center"}},
            currentEmployee && h('div', {style:{background:T.faint,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:"600"}}, currentEmployee),
            currentEmployee && h('button', {onClick:()=>{setCurrentEmployee(null);setView("login");}, style:{background:"none",border:`1px solid ${T.border}`,borderRadius:8,color:T.muted,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif"}}, "Déco"),
            !currentEmployee && currentSalon && h('button', {onClick:()=>{setCurrentSalon(null);setView("salon");setLoaded(false);}, style:{background:"none",border:`1px solid ${T.border}`,borderRadius:8,color:T.muted,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif"}}, "← Salons")
          )
        ),

        // NAV
        currentEmployee && h('div', {style:{background:T.surface,borderBottom:`1px solid ${T.border}`,display:"flex",overflowX:"auto",padding:"0 12px"}},
          [["dashboard","Saisie"],["totaux","Mes résultats"],["manager","Manager"],["ranking","Top Salons"],["stats","Stats"]].map(([v,label]) =>
            h('button', {key:v, onClick:()=>setView(v), style:{background:"none",border:"none",borderBottom:view===v?`2px solid ${T.text}`:"2px solid transparent",color:view===v?T.text:T.muted,padding:"12px 12px",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:view===v?"700":"500",whiteSpace:"nowrap"}}, label)
          )
        ),

        h('div', {style:{padding:"20px 16px",maxWidth:520,margin:"0 auto"}},

          // PASSWORD
          view==="password" && h('div', {style:{paddingTop:40}},
            h('div', {style:{textAlign:"center",marginBottom:32}},
              h('div', {style:{width:80,height:80,borderRadius:16,overflow:"hidden",margin:"0 auto 14px",boxShadow:"0 4px 20px rgba(0,0,0,0.12)"}},
                h('img', {src:"logo.png",alt:"TanTan",style:{width:"100%",height:"100%",objectFit:"cover",display:"block"}})
              ),
              h('div', {style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:"0.08em",lineHeight:1,marginBottom:6}}, "TanTan Stats"),

                          h('div', {style:{color:T.text,fontWeight:"700",fontSize:15}}, `${item.grand.toFixed(0)}€`)
                        ),
                        h('div', {style:{height:3,background:T.faint,borderRadius:2,overflow:"hidden"}}, h('div', {style:{width:`${(item.grand/maxVal)*100}%`,height:"100%",background:isMe?T.text:`${T.text}22`,borderRadius:2}}))
                      );
                    })
                  )
                );
              })()
            )
          ),

          // STATS
          view==="stats" && currentEmployee && stats && h('div', {style:{paddingTop:4}},
            h('div', {style:{marginBottom:20}}, h('div', {style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:"0.05em",marginBottom:2}}, "Statistiques"), h('div', {style:{color:T.muted,fontSize:13}}, salonObj?.name)),
            h('div', {style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}},
              [["💰","Revenus",`${stats.totalRev.toFixed(0)}€`],["👥","Clients",stats.totalClients],["🧴","Produits",`${stats.totalProd.toFixed(0)}€`]].map(([icon,label,val]) =>
                h('div', {key:label, style:{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 10px",textAlign:"center"}}, h('div', {style:{fontSize:20,marginBottom:4}}, icon), h('div', {style:{color:T.text,fontWeight:"700",fontSize:17}}, val), h('div', {style:{color:T.muted,fontSize:10}}, label))
              )
            ),
            h('div', {style:{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:20,marginBottom:12}},
              h('div', {style:{fontWeight:"700",fontSize:13,marginBottom:16}}, "Par jour de la semaine"),
              h('div', {style:{display:"flex",alignItems:"flex-end",gap:6,height:90}},
                DAYS.map((day,i) => { const hv=stats.byDay[i].rev/maxDay; return h('div', {key:day, style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}, h('div', {style:{fontSize:8,color:T.muted,height:12}}, stats.byDay[i].rev>0?`${stats.byDay[i].rev.toFixed(0)}€`:""), h('div', {style:{width:"100%",background:hv>0?T.text:T.faint,borderRadius:"3px 3px 0 0",height:`${Math.max(hv*65,3)}px`}}), h('div', {style:{color:T.muted,fontSize:9,fontWeight:"600"}}, day)); })
              )
            ),
            h('div', {style:{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:20,marginBottom:12}},
              h('div', {style:{fontWeight:"700",fontSize:13,marginBottom:16}}, "Par mois"),
              h('div', {style:{display:"flex",alignItems:"flex-end",gap:4,height:90}},
                MONTHS.map((month,i) => { const hv=stats.byMonth[i].rev/maxMonth; return h('div', {key:month, style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}, h('div', {style:{width:"100%",background:hv>0?T.text:T.faint,borderRadius:"3px 3px 0 0",height:`${Math.max(hv*65,3)}px`}}), h('div', {style:{color:T.muted,fontSize:8,fontWeight:"600"}}, month)); })
              )
            ),
            h('div', {style:{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:20}},
              h('div', {style:{fontWeight:"700",fontSize:13,marginBottom:16}}, "🏆 Classement"),
              EMPLOYEES.map((emp,rank) => ({emp,rev:stats.empStats[emp]?.total||0,clients:stats.empStats[emp]?.totalClients||0,prod:Object.values(allProducts[emp]||{}).reduce((s,p)=>s+p.total,0)})).sort((a,b)=>(b.rev+b.prod)-(a.rev+a.prod)).map((item,rank) =>
                h('div', {key:item.emp, style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${T.faint}`}},
                  h('span', {style:{fontSize:13,width:22,textAlign:"center"}}, ["🥇","🥈","🥉"][rank]||`${rank+1}.`),
                  h('div', {style:{width:28,height:28,borderRadius:"50%",background:item.emp===currentEmployee?T.text:T.faint,color:item.emp===currentEmployee?"#fff":T.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:"700"}}, item.emp[0]),
                  h('div', {style:{flex:1}}, h('div', {style:{color:T.text,fontSize:13,fontWeight:item.emp===currentEmployee?"700":"500"}}, item.emp), h('div', {style:{color:T.muted,fontSize:10}}, `${item.clients} clients · ${item.prod.toFixed(0)}€ produits`)),
                  h('div', {style:{color:T.text,fontWeight:"700",fontSize:14}}, `${item.rev.toFixed(0)}€`)
                )
              )
            )
          )
        )
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
